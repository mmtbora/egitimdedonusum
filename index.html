<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğitimde Dönüşüm | Başvuru sona erdi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 520px; }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px 32px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .card h1 {
            color: var(--primary);
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: 0.02em;
        }
        .card p {
            font-size: 17px;
            line-height: 1.6;
            font-weight: 500;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>EĞİTİMDE DÖNÜŞÜM</h1>
            <p>Atölyelere başvuru süreci tamamlanmıştır. İlginiz için teşekkür ederiz.</p>
        </div>
    </div>
</body>
</html>
